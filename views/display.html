<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Daily Screen</title>
  <link rel="stylesheet" href="/public/style.css">
  <link rel="manifest" href="/public/manifest.json">
  <meta name="theme-color" content="#0c0a0f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Atmospheric layers -->
  <div class="noise"></div>
  <div class="ambient-gradient"></div>

  <div class="screen">

    <!-- Compact info strip (left) -->
    <aside class="info-strip">
      <div class="info-clock-section">
        <time class="clock" id="clock">08:23</time>
        <h1 class="greeting" id="greeting">Bom dia</h1>
        <p class="date" id="date-display"></p>
      </div>

      <div class="info-weather" id="weather">
        <div class="weather-loading">...</div>
      </div>

      <nav class="period-nav" id="period-nav" aria-label="Filtro de período">
        <button class="period-nav-btn active" data-period="all" data-i18n="period.all">Todos</button>
        <button class="period-nav-btn" data-period="morning" data-i18n="period.morning">Manhã</button>
        <button class="period-nav-btn" data-period="afternoon" data-i18n="period.afternoon">Tarde</button>
        <button class="period-nav-btn" data-period="night" data-i18n="period.night">Noite</button>
      </nav>

      <div class="date-nav" id="date-nav">
        <button class="date-nav-btn" id="date-prev" aria-label="Dia anterior" data-i18n-aria="display.prevDay">‹</button>
        <button class="date-nav-btn date-nav-today" id="date-today" data-i18n="display.today">Hoje</button>
        <button class="date-nav-btn" id="date-next" aria-label="Próximo dia" data-i18n-aria="display.nextDay">›</button>
      </div>

      <button class="completed-toggle" id="completed-toggle" hidden>
        <span class="completed-toggle-icon">🏁</span>
        <span class="completed-toggle-label" data-i18n="display.completed">Concluídos</span>
        <span class="completed-toggle-count" id="completed-count">0</span>
      </button>
    </aside>

    <!-- Task columns — THE HERO -->
    <div class="columns" id="columns">
      <div class="period-empty" id="period-empty" hidden>
        <span class="period-empty-icon">🌙</span>
        <p class="period-empty-text" data-i18n="display.emptyPeriod">Nada agendado para este período.</p>
      </div>
      <div class="column col-medication" data-category="medication" id="col-medication">
        <div class="column-header">
          <span class="column-icon">💊</span>
          <span class="column-label" data-i18n="display.medications">Medicamentos</span>
          <span class="column-line"></span>
        </div>
        <div class="column-tasks"></div>
      </div>

      <div class="column col-supplement" data-category="supplement" id="col-supplement">
        <div class="column-header">
          <span class="column-icon">🧬</span>
          <span class="column-label" data-i18n="display.supplements">Suplementos</span>
          <span class="column-line"></span>
        </div>
        <div class="column-tasks"></div>
      </div>

      <div class="column col-reminder" data-category="reminder" id="col-reminder">
        <div class="column-header">
          <span class="column-icon">📋</span>
          <span class="column-label" data-i18n="display.reminders">Lembretes</span>
          <span class="column-line"></span>
        </div>
        <div class="column-tasks"></div>
      </div>
    </div>

  </div>

  <!-- Progress bar — full width bottom -->
  <div class="progress-dock" id="progress-dock">
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="progress-text" id="progress-text">0 de 0</span>
  </div>

  <!-- Celebration overlay -->
  <div class="celebration" id="celebration">
    <div class="confetti-container" id="confetti"></div>
    <div class="celebration-content">
      <span class="celebration-emoji">✨</span>
      <p class="celebration-text" data-i18n="display.allDone">Tudo feito!</p>
      <p class="celebration-sub" data-i18n="display.goodWork">Bom trabalho hoje.</p>
    </div>
  </div>

  <!-- Offline / failed-load banner (shown when a day can't be fetched) -->
  <div class="load-error" id="load-error" hidden data-i18n="display.loadError">Sem conexão — não foi possível carregar este dia.</div>

  <!-- Recreate prompt overlay (asks to restart the original task/protocol) -->
  <div class="recreate-prompt" id="recreate-prompt">
    <div class="recreate-content">
      <span class="recreate-icon" id="recreate-icon">🔁</span>
      <p class="recreate-text" id="recreate-text"></p>
      <div class="recreate-actions">
        <button type="button" class="recreate-btn recreate-no" id="recreate-no" data-i18n="display.recreateNo">Não</button>
        <button type="button" class="recreate-btn recreate-yes" id="recreate-yes" data-i18n="display.recreateYes">Sim, recriar</button>
      </div>
    </div>
  </div>

  <!-- Concluídos panel (completed series + protocols, on demand) -->
  <div class="completed-panel" id="completed-panel">
    <div class="completed-panel-inner">
      <header class="completed-panel-head">
        <h2 class="completed-panel-title">
          <span class="completed-panel-icon">🏁</span>
          <span data-i18n="display.completedTitle">Concluídos</span>
        </h2>
        <button type="button" class="completed-close" id="completed-close" aria-label="Fechar" data-i18n-aria="display.close">×</button>
      </header>
      <div class="completed-list" id="completed-list"></div>
      <p class="completed-empty" id="completed-empty" data-i18n="display.completedEmpty" hidden>Nada concluído ainda.</p>
    </div>
  </div>

  <script src="/public/utils.js"></script>
  <script src="/public/i18n.js"></script>
  <script src="/public/display.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      // The wall tablet keeps the tab open 24/7, so a new SW never takes over
      // on its own. Reload once a fresh SW activates so the device picks up the
      // latest shell, and nudge an update check on load. Only reload when a
      // controller already existed (a real update) — a first-ever install also
      // fires controllerchange via clients.claim and needs no reload.
      const hadController = !!navigator.serviceWorker.controller;
      let reloadingForSW = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (reloadingForSW || !hadController) return;
        reloadingForSW = true;
        location.reload();
      });
      navigator.serviceWorker.register('/public/sw.js').then((reg) => reg.update());
    }
  </script>
</body>
</html>
