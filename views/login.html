<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Screen — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }
    .login-box {
      background: #151515;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 360px;
    }
    h1 {
      font-size: 1.3rem;
      margin-bottom: 24px;
      text-align: center;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      background: #222;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 1rem;
      margin-bottom: 20px;
      outline: none;
    }
    input[type="password"]:focus {
      border-color: #3498db;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #2980b9; }
    .error {
      background: #e74c3c22;
      color: #e74c3c;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <form class="login-box" method="POST" action="/admin/login">
    <h1 data-i18n="login.title">Daily Screen</h1>
    <div id="error" class="error" style="display:none"></div>
    <label for="password" data-i18n="login.password">Senha</label>
    <input type="password" id="password" name="password" autofocus required>
    <button type="submit" data-i18n="login.submit">Entrar</button>
  </form>
  <script src="/public/i18n.js"></script>
  <script src="/public/login.js"></script>
</body>
</html>
